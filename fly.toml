app = 'hub-ge69zq'
primary_region = 'ams'

[build]

[[mounts]]
  source = 'config'
  destination = '/config'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "90s"
    interval = "30s"
    timeout = "15s"
    method = "GET"
    path = "/"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
